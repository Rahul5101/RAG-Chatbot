services:
  etcd:
    container_name: milvus-etcd-p01
    image: quay.io/coreos/etcd:v3.5.18
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    container_name: milvus-minio-p01
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"

  standalone:
    container_name: milvus-standalone-p01
    image: milvusdb/milvus:v2.6.0
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    volumes:
      - ./volumes/milvus:/var/lib/milvus

  redis:
    image: redis/redis-stack:latest
    container_name: redis-stack
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    image: km-rag_chatbot-be:latest
    container_name: km-rag_chatbot-be
    restart: unless-stopped
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MILVUS_HOST=${MILVUS_HOST:-standalone}
      - MILVUS_PORT=${MILVUS_PORT:-19530}
      - REDIS_HOST=redis-stack
      - REDIS_PORT=6379
      - MODEL_NAME=gemini-2.5-flash
      - MODAL_NAME=gemini-2.5-flash
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
      - DATABASE_URL=sqlite:////app/data/chat_history.db
      - FRONTEND_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./service-account.json:/app/service-account.json:ro
      - ./chat_history.db:/app/data/chat_history.db:rw
    depends_on:
      redis:
        condition: service_healthy
      standalone:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build: ./frontend
    image: km-rag_chatbot-fe:latest
    container_name: km-rag_chatbot-fe
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis-data:
